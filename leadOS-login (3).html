<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadOS — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050810;color:#f0f4ff;font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,255,136,0.08),transparent 60%);pointer-events:none}
.card{background:#0c1120;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:40px 36px 32px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.logo-mark{width:38px;height:38px;background:#00ff88;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:#000}
.logo-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:900}
.logo-name span{color:#00ff88}
h2{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;text-align:center;margin-bottom:6px}
.sub{font-size:11px;color:#5a7099;text-align:center;margin-bottom:28px}
.msg{padding:10px 14px;border-radius:8px;font-size:11px;margin-bottom:14px;display:none;line-height:1.5}
.msg.show{display:block}
.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#fca5a5}
.ok{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.25);color:#00ff88}
.inf{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.25);color:#93c5fd}
.oauth-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.oauth-btn{width:100%;padding:13px 16px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:#111827;font-family:'DM Mono',monospace;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:12px;color:#f0f4ff;transition:all 0.2s}
.oauth-btn:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.2);transform:translateY(-1px)}
.oauth-btn span{flex:1;text-align:left}
.oauth-btn em{color:#5a7099;font-style:normal;font-size:10px}
.google-btn{border-color:rgba(66,133,244,0.3)}
.google-btn:hover{border-color:rgba(66,133,244,0.6);background:rgba(66,133,244,0.08)}
.msft-btn{border-color:rgba(0,120,215,0.3)}
.msft-btn:hover{border-color:rgba(0,120,215,0.6);background:rgba(0,120,215,0.08)}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;font-size:10px;color:#2d3f5a}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06)}
label{display:block;font-size:9px;color:#5a7099;text-transform:uppercase;letter-spacing:2px;margin-bottom:5px;margin-top:12px}
input{width:100%;background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:11px 13px;font-family:'DM Mono',monospace;font-size:12px;color:#f0f4ff;outline:none;transition:border-color 0.2s}
input:focus{border-color:rgba(0,255,136,0.4)}
input::placeholder{color:#2d3f5a}
.forgot{text-align:right;font-size:10px;margin-top:4px}
.forgot a{color:#5a7099;text-decoration:none}
.forgot a:hover{color:#00ff88}
.signin-btn{width:100%;margin-top:16px;padding:13px;border-radius:10px;border:none;background:#00ff88;color:#000;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
.signin-btn:hover{background:#00e87a;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,255,136,0.3)}
.signin-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.demo-btn{width:100%;margin-top:10px;padding:11px;border-radius:10px;background:rgba(59,130,246,0.08);color:#93c5fd;border:1px solid rgba(59,130,246,0.2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s}
.demo-btn:hover{background:rgba(59,130,246,0.15)}
.trust{display:flex;justify-content:center;gap:14px;margin-top:18px;flex-wrap:wrap}
.trust span{font-size:9px;color:#2d3f5a;display:flex;align-items:center;gap:4px}
.trust span::before{content:'✓';color:#00ff88;font-weight:700}
.footer{text-align:center;margin-top:18px;font-size:10px;color:#2d3f5a;position:relative;z-index:1}
.footer a{color:#2d3f5a;text-decoration:none}
.footer a:hover{color:#f0f4ff}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,0.15);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">L</div>
    <div class="logo-name">Lead<span>OS</span></div>
  </div>
  <h2>Welcome back</h2>
  <p class="sub">Sign in to start finding leads automatically.</p>

  <div id="msgErr" class="msg err"></div>
  <div id="msgOk"  class="msg ok"></div>
  <div id="msgInf" class="msg inf"></div>

  <div class="oauth-wrap">
    <button class="oauth-btn google-btn" id="btnG" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M46.145 24.503c0-1.613-.131-3.163-.375-4.652H24v8.804h12.434c-.537 2.892-2.162 5.343-4.609 6.988v5.808h7.461c4.363-4.02 6.859-9.94 6.859-16.948z"/>
        <path fill="#34A853" d="M24 47c6.237 0 11.466-2.068 15.287-5.599l-7.461-5.808c-2.068 1.388-4.713 2.203-7.826 2.203-6.018 0-11.115-4.065-12.935-9.533H3.346v5.996C7.148 41.852 15.012 47 24 47z"/>
        <path fill="#FBBC05" d="M11.065 28.263A14.29 14.29 0 0 1 10.29 24c0-1.489.254-2.929.775-4.263v-5.996H3.346A23.94 23.94 0 0 0 0 24c0 3.867.926 7.525 2.557 10.779l8.508-6.516z"/>
        <path fill="#EA4335" d="M24 9.748c3.393 0 6.437 1.167 8.829 3.458l6.619-6.619C35.454 2.938 30.227.5 24 .5 15.012.5 7.148 5.648 3.346 13.741l8.508 6.516C13.6 14.779 18.703 9.748 24 9.748z"/>
      </svg>
      <span>Continue with Google</span>
      <em>→</em>
    </button>
    <button class="oauth-btn msft-btn" id="btnM" onclick="signInMicrosoft()">
      <svg width="18" height="18" viewBox="0 0 21 21">
        <rect x="0"  y="0"  width="10" height="10" fill="#F25022"/>
        <rect x="11" y="0"  width="10" height="10" fill="#7FBA00"/>
        <rect x="0"  y="11" width="10" height="10" fill="#00A4EF"/>
        <rect x="11" y="11" width="10" height="10" fill="#FFB900"/>
      </svg>
      <span>Continue with Microsoft</span>
      <em>→</em>
    </button>
  </div>

  <div class="divider">or sign in with email</div>

  <label>Email</label>
  <input type="email" id="em" placeholder="you@company.com"/>
  <label>Password</label>
  <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')emailLogin()"/>
  <div class="forgot"><a href="#" onclick="forgotPw();return false">Forgot password?</a></div>

  <button class="signin-btn" id="signBtn" onclick="emailLogin()">Sign In →</button>
  <button class="demo-btn" onclick="demoLogin()">⚡ Demo Login — try without an account</button>

  <div class="trust">
    <span>No contracts</span>
    <span>Cancel anytime</span>
    <span>Your data stays yours</span>
  </div>
</div>

<div class="footer">
  <a href="leadOS-landing-page.html">← Homepage</a> &nbsp;·&nbsp;
  <a href="mailto:support@tryleados.com">Support</a>
</div>

<!-- Load Supabase with multiple fallbacks -->
<script>
window.SB_URL = 'https://vvsshirbxfypjvrdmgls.supabase.co';
window.SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2c3NoaXJieGZ5cGp2cmRtZ2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTIwODQsImV4cCI6MjA4OTMyODA4NH0.XtNj4zIamNNUbo3Hhpu4dayzhT9XvwMZY1PhP9vLybY';
window.DASH = 'https://tryleados.com/leadOS-dashboard.html';

function loadSupabase(urls, idx) {
  if (idx >= urls.length) {
    document.getElementById('msgErr').textContent = 'Failed to load auth library. Please refresh.';
    document.getElementById('msgErr').classList.add('show');
    return;
  }
  var s = document.createElement('script');
  s.src = urls[idx];
  s.onload = function() { initApp(); };
  s.onerror = function() { loadSupabase(urls, idx + 1); };
  document.head.appendChild(s);
}

var CDN_URLS = [
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js',
  'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js',
  'https://esm.sh/@supabase/supabase-js@2/dist/supabase.js'
];

function initApp() {
  if (!window.supabase) {
    document.getElementById('msgErr').textContent = 'Auth library not available. Please refresh.';
    document.getElementById('msgErr').classList.add('show');
    return;
  }

  window.sb = supabase.createClient(window.SB_URL, window.SB_KEY);

  // Check existing session
  sb.auth.getSession().then(function(res) {
    if (res.data && res.data.session && res.data.session.user) {
      saveAndGo(res.data.session.user, 'supabase');
    } else if (sessionStorage.getItem('leadOS_token')) {
      window.location.href = window.DASH;
    }
  }).catch(function() {});
}

function msg(type, text) {
  ['msgErr','msgOk','msgInf'].forEach(function(id) {
    document.getElementById(id).classList.remove('show');
  });
  var map = {err:'msgErr', ok:'msgOk', inf:'msgInf'};
  var el = document.getElementById(map[type]);
  if (el) { el.textContent = text; el.classList.add('show'); }
}

function saveAndGo(user, provider) {
  sessionStorage.setItem('leadOS_token', user.id || 'sb_' + Date.now());
  sessionStorage.setItem('leadOS_user', JSON.stringify({
    id: user.id, email: user.email,
    name: (user.user_metadata && user.user_metadata.full_name) || user.email,
    provider: provider
  }));
  msg('ok', 'Signed in! Redirecting...');
  setTimeout(function() { window.location.href = window.DASH; }, 600);
}

function signInGoogle() {
  if (!window.sb) { msg('err', 'Please wait — loading...'); return; }
  document.getElementById('btnG').style.opacity = '0.6';
  sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.DASH }
  }).then(function(res) {
    if (res.error) {
      document.getElementById('btnG').style.opacity = '1';
      msg('err', res.error.message);
    }
  });
}

function signInMicrosoft() {
  if (!window.sb) { msg('err', 'Please wait — loading...'); return; }
  document.getElementById('btnM').style.opacity = '0.6';
  sb.auth.signInWithOAuth({
    provider: 'azure',
    options: { redirectTo: window.DASH, scopes: 'email profile User.Read' }
  }).then(function(res) {
    if (res.error) {
      document.getElementById('btnM').style.opacity = '1';
      msg('err', res.error.message);
    }
  });
}

function emailLogin() {
  if (!window.sb) { msg('err', 'Please wait — loading...'); return; }
  var email = document.getElementById('em').value.trim();
  var pw = document.getElementById('pw').value;
  if (!email) { msg('err', 'Please enter your email.'); return; }
  if (!pw) { msg('err', 'Please enter your password.'); return; }

  var btn = document.getElementById('signBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>Signing in...';

  if (email === 'admin@leadOS.ai' && pw === 'LeadOS2024!') {
    saveAndGo({ id: 'demo', email: email, user_metadata: { full_name: 'Demo User' }}, 'demo');
    return;
  }

  sb.auth.signInWithPassword({ email: email, password: pw }).then(function(res) {
    if (res.error) {
      msg('err', res.error.message.includes('Invalid') ? 'Incorrect email or password.' : res.error.message);
      btn.disabled = false;
      btn.innerHTML = 'Sign In →';
      return;
    }
    saveAndGo(res.data.user, 'email');
  });
}

function forgotPw() {
  var email = document.getElementById('em').value.trim();
  if (!email) { msg('inf', 'Enter your email above first.'); return; }
  if (window.sb) sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://tryleados.com/leadOS-login.html' });
  msg('ok', 'Password reset email sent to ' + email);
}

function demoLogin() {
  document.getElementById('em').value = 'admin@leadOS.ai';
  document.getElementById('pw').value = 'LeadOS2024!';
  msg('inf', 'Demo credentials loaded...');
  setTimeout(emailLogin, 400);
}

// Start loading Supabase
loadSupabase(CDN_URLS, 0);
</script>
</body>
</html>
