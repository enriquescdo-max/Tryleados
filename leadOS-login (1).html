<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadOS — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--surface:#0c1120;--surface2:#111827;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--accent:#00ff88;--text:#f0f4ff;--muted:#6b7a99}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.bg-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(0,255,136,0.07) 0%,transparent 60%)}
.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,136,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,0.022) 1px,transparent 1px);background-size:44px 44px}
.card{background:var(--surface);border:1px solid var(--border2);border-radius:22px;padding:38px 36px 30px;width:100%;max-width:430px;position:relative;z-index:1;box-shadow:0 40px 100px rgba(0,0,0,.55)}
.logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.logo-mark{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:900;color:#000}
.logo-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:900}
.logo-name span{color:var(--accent)}
.card-title{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;text-align:center;margin-bottom:5px}
.card-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:26px;line-height:1.65}
.msg{padding:10px 14px;border-radius:8px;font-size:11px;line-height:1.55;margin-bottom:16px;display:none}
.msg.show{display:block}
.msg.error{background:rgba(255,51,102,0.09);border:1px solid rgba(255,51,102,.22);color:#ff8099}
.msg.success{background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,.2);color:var(--accent)}
.msg.info{background:rgba(0,102,255,0.07);border:1px solid rgba(0,102,255,.2);color:#88aaff}
.oauth-stack{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.oauth-btn{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--border2);background:var(--surface2);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;color:var(--text);position:relative;overflow:hidden}
.oauth-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.2);transform:translateY(-1px)}
.oauth-btn:active{transform:translateY(0)}
.oauth-btn svg{flex-shrink:0}
.oauth-btn .lbl{flex:1;text-align:left}
.oauth-btn .arr{font-size:10px;color:var(--muted);transition:transform .2s}
.oauth-btn:hover .arr{transform:translateX(3px)}
.oauth-btn.loading{opacity:.6;pointer-events:none}
.oauth-btn.loading .arr{display:none}
.oauth-btn.loading::after{content:'';position:absolute;right:14px;top:50%;margin-top:-7px;width:14px;height:14px;border:2px solid rgba(255,255,255,.15);border-top-color:rgba(255,255,255,.7);border-radius:50%;animation:spin .6s linear infinite}
.btn-google{border-color:rgba(66,133,244,.25)}
.btn-google:hover{border-color:rgba(66,133,244,.5);background:rgba(66,133,244,.07)}
.btn-msft{border-color:rgba(0,120,215,.25)}
.btn-msft:hover{border-color:rgba(0,120,215,.5);background:rgba(0,120,215,.07)}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;font-size:10px;color:var(--muted)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.field{margin-bottom:14px}
.field label{display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.field input:focus{border-color:rgba(0,255,136,.4);box-shadow:0 0 0 3px rgba(0,255,136,.05)}
.field input::placeholder{color:var(--muted)}
.forgot{text-align:right;font-size:10px;margin-top:-6px;margin-bottom:14px}
.forgot a{color:var(--muted);text-decoration:none}
.forgot a:hover{color:var(--accent)}
.btn-signin{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:#000;font-family:'DM Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.5px}
.btn-signin:hover{background:#00e87a;transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,255,136,.3)}
.btn-signin:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-demo{width:100%;padding:11px;border-radius:10px;background:rgba(0,102,255,0.08);color:#7799ff;border:1px solid rgba(0,102,255,.2);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;margin-top:10px}
.btn-demo:hover{background:rgba(0,102,255,.15)}
.trust-strip{display:flex;justify-content:center;gap:16px;margin-top:20px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted)}
.trust-item::before{content:'✓';color:var(--accent);font-weight:700}
.toggle-mode{text-align:center;font-size:11px;color:var(--muted);margin-top:16px}
.toggle-mode a{color:var(--accent);text-decoration:none;font-weight:600}
.footer{text-align:center;margin-top:20px;font-size:10px;color:var(--muted);position:relative;z-index:1}
.footer a{color:var(--muted);text-decoration:none}
.footer a:hover{color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.15);border-top-color:#000;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:7px}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">L</div>
    <div class="logo-name">Lead<span>OS</span></div>
  </div>

  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to start finding leads automatically.</div>

  <div class="msg error"   id="msgError"></div>
  <div class="msg success" id="msgSuccess"></div>
  <div class="msg info"    id="msgInfo"></div>

  <div class="oauth-stack">
    <button class="oauth-btn btn-google" id="btnGoogle" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#4285F4" d="M46.145 24.503c0-1.613-.131-3.163-.375-4.652H24v8.804h12.434c-.537 2.892-2.162 5.343-4.609 6.988v5.808h7.461c4.363-4.02 6.859-9.94 6.859-16.948z"/>
        <path fill="#34A853" d="M24 47c6.237 0 11.466-2.068 15.287-5.599l-7.461-5.808c-2.068 1.388-4.713 2.203-7.826 2.203-6.018 0-11.115-4.065-12.935-9.533H3.346v5.996C7.148 41.852 15.012 47 24 47z"/>
        <path fill="#FBBC05" d="M11.065 28.263A14.29 14.29 0 0 1 10.29 24c0-1.489.254-2.929.775-4.263v-5.996H3.346A23.94 23.94 0 0 0 0 24c0 3.867.926 7.525 2.557 10.779l8.508-6.516z" opacity=".9"/>
        <path fill="#EA4335" d="M24 9.748c3.393 0 6.437 1.167 8.829 3.458l6.619-6.619C35.454 2.938 30.227.5 24 .5 15.012.5 7.148 5.648 3.346 13.741l8.508 6.516C13.6 14.779 18.703 9.748 24 9.748z"/>
      </svg>
      <span class="lbl">Continue with Google</span>
      <span class="arr">→</span>
    </button>

    <button class="oauth-btn btn-msft" id="btnMicrosoft" onclick="signInMicrosoft()">
      <svg width="18" height="18" viewBox="0 0 21 21">
        <rect x="0"  y="0"  width="10" height="10" fill="#F25022"/>
        <rect x="11" y="0"  width="10" height="10" fill="#7FBA00"/>
        <rect x="0"  y="11" width="10" height="10" fill="#00A4EF"/>
        <rect x="11" y="11" width="10" height="10" fill="#FFB900"/>
      </svg>
      <span class="lbl">Continue with Microsoft</span>
      <span class="arr">→</span>
    </button>
  </div>

  <div class="divider">or sign in with email</div>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="emailInput" placeholder="you@company.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="pwInput" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')handleEmailLogin()"/>
  </div>
  <div class="forgot"><a href="#" onclick="handleForgot();return false">Forgot password?</a></div>

  <button class="btn-signin" id="signinBtn" onclick="handleEmailLogin()">Sign In →</button>
  <button class="btn-demo" onclick="demoLogin()">⚡ Demo Login — try without an account</button>

  <div class="trust-strip">
    <div class="trust-item">No contracts</div>
    <div class="trust-item">Cancel anytime</div>
    <div class="trust-item">Month-to-month</div>
    <div class="trust-item">Your data stays yours</div>
  </div>
  <div class="toggle-mode">No account? <a href="leadOS-reseller-signup.html">Get started free →</a></div>
</div>

<div class="footer">
  <a href="leadOS-landing-page.html">← Homepage</a>
  &nbsp;·&nbsp;
  <a href="mailto:support@tryleados.com">Support</a>
</div>

<!-- Supabase v2 from CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>

// ── YOUR CREDENTIALS ─────────────────────────────────────────
const SUPABASE_URL  = 'https://vvsshirbxfypjvrdmgls.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2c3NoaXJieGZ5cGp2cmRtZ2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTIwODQsImV4cCI6MjA4OTMyODA4NH0.XtNj4zIamNNUbo3Hhpu4dayzhT9XvwMZY1PhP9vLybY';
const DASHBOARD     = 'https://tryleados.com/leadOS-dashboard.html';

// ── Init Supabase ─────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Helpers ───────────────────────────────────────────────────
function showMsg(type, text) {
  ['msgError','msgSuccess','msgInfo'].forEach(id => document.getElementById(id).classList.remove('show'));
  const map = { error:'msgError', success:'msgSuccess', info:'msgInfo' };
  const el = document.getElementById(map[type]);
  if (el) { el.textContent = text; el.classList.add('show'); }
}

function go() { setTimeout(() => { window.location.href = DASHBOARD; }, 500); }

function saveSession(user, provider) {
  try {
    sessionStorage.setItem('leadOS_token', user.id || 'sb_' + Date.now());
    sessionStorage.setItem('leadOS_user', JSON.stringify({
      id: user.id, email: user.email,
      name: user.user_metadata?.full_name || user.email,
      provider
    }));
  } catch(e) {}
}

// ── Check existing session ────────────────────────────────────
(async function() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session?.user) { saveSession(session.user, 'supabase'); go(); return; }
    if (sessionStorage.getItem('leadOS_token')) go();
  } catch(e) {}
})();

// ── Google login ──────────────────────────────────────────────
async function signInGoogle() {
  const btn = document.getElementById('btnGoogle');
  btn.classList.add('loading');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: DASHBOARD }
  });
  if (error) {
    btn.classList.remove('loading');
    showMsg('error', error.message);
  }
}

// ── Microsoft login ───────────────────────────────────────────
async function signInMicrosoft() {
  const btn = document.getElementById('btnMicrosoft');
  btn.classList.add('loading');
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'azure',
    options: { redirectTo: DASHBOARD, scopes: 'email profile User.Read' }
  });
  if (error) {
    btn.classList.remove('loading');
    showMsg('error', error.message);
  }
}

// ── Email + password ──────────────────────────────────────────
async function handleEmailLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const pw    = document.getElementById('pwInput').value;
  if (!email) { showMsg('error','Enter your email.'); return; }
  if (!pw)    { showMsg('error','Enter your password.'); return; }

  const btn = document.getElementById('signinBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  // Demo shortcut
  if (email === 'admin@leadOS.ai' && pw === 'LeadOS2024!') {
    saveSession({ id:'demo', email, user_metadata:{ full_name:'Demo User' } }, 'email');
    showMsg('success','Signed in! Redirecting...');
    go(); return;
  }

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    showMsg('error', error.message.includes('Invalid') ? 'Incorrect email or password.' : error.message);
    btn.disabled = false; btn.innerHTML = 'Sign In →'; return;
  }
  saveSession(data.user, 'email');
  showMsg('success','Signed in! Redirecting...');
  go();
}

// ── Forgot password ───────────────────────────────────────────
async function handleForgot() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email) { showMsg('info','Enter your email above first.'); return; }
  await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://tryleados.com/leadOS-login.html' });
  showMsg('success','Reset email sent to ' + email);
}

// ── Demo login ────────────────────────────────────────────────
async function demoLogin() {
  document.getElementById('emailInput').value = 'admin@leadOS.ai';
  document.getElementById('pwInput').value    = 'LeadOS2024!';
  showMsg('info','Demo credentials loaded...');
  setTimeout(handleEmailLogin, 300);
}

</script>
</body>
</html>
